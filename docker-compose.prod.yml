# ============================================================
# miCompaWeb Docker Compose - Production Stack
# Stack completo con: reverse proxy, SSL, replicas, secrets
# ============================================================

services:
  # --- Nginx Reverse Proxy + SSL ---
  nginx:
    image: nginx:alpine
    container_name: micompaweb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - micompaweb-net
    depends_on:
      - micompaweb-api
    restart: unless-stopped

  # --- miCompaWeb API Server (modo produccion) ---
  micompaweb-api:
    image: ghcr.io/elcompadigital/micompaweb:1.2.0
    container_name: micompaweb-api
    environment:
      - PRODUCTION_MODE=true
      - WORKER_COUNT=4
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - ENABLE_ANTI_BOT=true
      - CACHE_DIR=/app/.cache
      - PROJECTS_DIR=/app/projects
    env_file:
      - .env
    volumes:
      - projects-data:/app/projects
      - app-cache:/app/.cache
    networks:
      - micompaweb-net
    depends_on:
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_started
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import micompaweb"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Qdrant: Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: micompaweb-qdrant
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - micompaweb-net
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- SearXNG: Meta-buscador ---
  searxng:
    image: searxng/searxng:latest
    container_name: micompaweb-searxng
    environment:
      - BASE_URL=https://search.tudominio.com/
      - INSTANCE_NAME=miCompaWeb-Search
    volumes:
      - ./docker/searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    networks:
      - micompaweb-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # --- Redis: Cache distribuida ---
  redis:
    image: redis:7-alpine
    container_name: micompaweb-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - micompaweb-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Watchtower: Auto-update containers ---
  watchtower:
    image: containrrr/watchtower:latest
    container_name: micompaweb-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    restart: unless-stopped
    profiles:
      - with-watchtower

networks:
  micompaweb-net:
    driver: bridge

volumes:
  qdrant-data:
    driver: local
  searxng-data:
    driver: local
  projects-data:
    driver: local
  app-cache:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
