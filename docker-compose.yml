# ============================================================
# miCompaWeb Docker Compose - Development Stack
# Incluye: App + Qdrant (vector DB) + SearXNG (SERP propia)
# ============================================================

services:
  # --- Qdrant: Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: micompaweb-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - micompaweb-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- SearXNG: Meta-buscador privado ---
  searxng:
    image: searxng/searxng:latest
    container_name: micompaweb-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./docker/searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=miCompaWeb-Search
    networks:
      - micompaweb-net
    depends_on:
      - qdrant
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    security_opt:
      - no-new-privileges:true

  # --- miCompaWeb CLI Application ---
  micompaweb:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: micompaweb:1.2.0
    container_name: micompaweb-app
    volumes:
      - ./projects:/app/projects
      - ./.env:/app/.env:ro
      - app-cache:/app/.cache
    environment:
      - PROJECTS_DIR=/app/projects
      - CACHE_DIR=/app/.cache
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - micompaweb-net
    depends_on:
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_started
    stdin_open: true
    tty: true
    command: ["doctor"]

  # --- Redis: Cache distribuida (opcional) ---
  redis:
    image: redis:7-alpine
    container_name: micompaweb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - micompaweb-net
    profiles:
      - with-redis

  # --- NocoDB: Dashboard (opcional) ---
  nocodb:
    image: nocodb/nocodb:latest
    container_name: micompaweb-nocodb
    ports:
      - "8090:8080"
    environment:
      - NC_DB=pg://nocodb-db:5432?u=noco&p=noco&d=nocodb
    volumes:
      - nocodb-data:/usr/app/data
    depends_on:
      - nocodb-db
    networks:
      - micompaweb-net
    profiles:
      - with-nocodb

  nocodb-db:
    image: postgres:15-alpine
    container_name: micompaweb-nocodb-db
    environment:
      POSTGRES_USER: noco
      POSTGRES_PASSWORD: noco
      POSTGRES_DB: nocodb
    volumes:
      - nocodb-db-data:/var/lib/postgresql/data
    networks:
      - micompaweb-net
    profiles:
      - with-nocodb

  # --- Ollama: LLM local (opcional) ---
  ollama:
    image: ollama/ollama:latest
    container_name: micompaweb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - micompaweb-net
    profiles:
      - with-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  micompaweb-net:
    driver: bridge

volumes:
  qdrant-data:
  searxng-data:
  app-cache:
  redis-data:
  nocodb-data:
  nocodb-db-data:
  ollama-data:
